<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSCI 1120 Isolated Practice Site</title>
  <meta name="description" content="Isolated CSCI 1120 practice quiz site with independent data files." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <p class="eyebrow">CSCI 1120</p>
      <h1>Isolated Practice Site</h1>
      <p class="subtitle">This website is independent from other quiz apps in this repository.</p>
    </header>

    <main class="card" aria-live="polite">
      <section id="setup-screen">
        <h2>Quiz Setup</h2>

        <label class="field" for="student-name">Student name</label>
        <input id="student-name" class="text-input" type="text" placeholder="Enter your name" />

        <div class="setup-row">
          <label class="field" for="module-select">Module</label>
          <select id="module-select" class="select-input"></select>
        </div>

        <div class="setup-row">
          <div class="field-wrap">
            <p class="field">Sections</p>
            <div class="section-actions">
              <button type="button" class="btn btn-ghost" id="btn-select-all">Select all</button>
              <button type="button" class="btn btn-ghost" id="btn-clear-all">Clear all</button>
            </div>
          </div>
          <div id="sections-list" class="sections-list"></div>
        </div>

        <div class="setup-row actions">
          <button type="button" class="btn btn-primary" id="btn-start">Start Quiz</button>
        </div>
      </section>

      <section id="quiz-screen" class="hidden">
        <div class="quiz-head">
          <p id="quiz-meta">Question 1 of 1</p>
          <p id="quiz-section" class="pill"></p>
        </div>
        <h2 id="question-text"></h2>
        <div id="options-list" class="options-list"></div>

        <div class="setup-row actions">
          <button type="button" class="btn btn-ghost" id="btn-prev">Previous</button>
          <button type="button" class="btn btn-primary" id="btn-next">Next</button>
        </div>
      </section>

      <section id="results-screen" class="hidden">
        <h2>Results</h2>
        <p id="results-summary" class="results-summary"></p>
        <div class="setup-row actions">
          <button type="button" class="btn btn-primary" id="btn-restart">Back to Setup</button>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
