<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VP Request Inspector</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; width: 700px; max-height: 600px; display: flex; flex-direction: column; background: #0f1117; color: #e2e8f0; font-size: 13px; }

  /* Header */
  .header { display: flex; align-items: center; gap: 8px; padding: 10px 12px; background: #1a1d27; border-bottom: 1px solid #2d3148; }
  .header h1 { font-size: 14px; font-weight: 700; color: #a78bfa; flex: 1; }
  .header-actions { display: flex; gap: 6px; }
  button { cursor: pointer; border: none; border-radius: 5px; padding: 5px 10px; font-size: 12px; font-weight: 600; }
  #clearBtn  { background: #3f3f5a; color: #e2e8f0; }
  #clearBtn:hover { background: #ef4444; color: #fff; }
  #saveBtn   { background: #065f46; color: #6ee7b7; }
  #saveBtn:hover { background: #059669; color: #fff; }
  #copyBtn   { background: #6366f1; color: #fff; }
  #copyBtn:hover { background: #818cf8; }
  #filterInput { background: #1e2030; border: 1px solid #3d4166; color: #e2e8f0; border-radius: 5px; padding: 4px 8px; font-size: 12px; width: 180px; }
  #filterInput::placeholder { color: #6b7280; }
  .count { font-size: 11px; color: #6b7280; white-space: nowrap; }

  /* List */
  .list { overflow-y: auto; flex: 1; }
  .req-row { border-bottom: 1px solid #1e2030; padding: 6px 10px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
  .req-row:hover { background: #1a1d2e; }
  .req-row.active { background: #1e2240; }
  .badge { font-size: 10px; font-weight: 700; padding: 2px 5px; border-radius: 3px; text-transform: uppercase; min-width: 36px; text-align: center; }
  .badge-xhr   { background: #854d0e; color: #fde68a; }
  .badge-fetch { background: #064e3b; color: #6ee7b7; }
  .status-ok   { color: #4ade80; }
  .status-err  { color: #f87171; }
  .req-url { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #94a3b8; }
  .req-url .url-path { color: #e2e8f0; }
  .req-method { color: #60a5fa; font-weight: 700; font-size: 11px; min-width: 36px; }
  .req-time { color: #6b7280; font-size: 11px; min-width: 45px; text-align: right; }

  /* Detail panel */
  .detail { background: #13151f; border-top: 1px solid #2d3148; max-height: 280px; overflow-y: auto; padding: 10px 12px; display: none; }
  .detail.open { display: block; }
  .detail-title { font-weight: 700; color: #a78bfa; margin-bottom: 6px; font-size: 12px; }
  .detail-url { word-break: break-all; color: #93c5fd; margin-bottom: 8px; font-size: 11px; }
  .detail-meta { display: flex; gap: 16px; margin-bottom: 8px; }
  .meta-item { font-size: 11px; color: #94a3b8; }
  .meta-item span { color: #e2e8f0; font-weight: 600; }
  .section-label { font-size: 11px; font-weight: 700; color: #6366f1; margin: 8px 0 4px; text-transform: uppercase; letter-spacing: 0.05em; }
  pre { background: #0d0f18; border: 1px solid #2d3148; border-radius: 5px; padding: 8px; font-size: 11px; white-space: pre-wrap; word-break: break-all; color: #d1d5db; max-height: 150px; overflow-y: auto; line-height: 1.5; }
  .empty { padding: 30px; text-align: center; color: #4b5563; }
  .empty-icon { font-size: 28px; margin-bottom: 8px; }

  /* Highlight JSON keys */
  .json-key   { color: #93c5fd; }
  .json-str   { color: #86efac; }
  .json-num   { color: #fde68a; }
  .json-bool  { color: #f9a8d4; }
  .json-null  { color: #94a3b8; }
</style>
</head>
<body>

<div class="header">
  <h1>🔍 Request Inspector</h1>
  <input id="filterInput" type="text" placeholder="Filter by URL…" value="viewpoint.ca/api">
  <span class="count" id="countLabel">0 requests</span>
  <div class="header-actions">
    <button id="clearBtn">Clear</button>
    <button id="saveBtn">💾 Save File</button>
    <button id="copyBtn">Copy JSON</button>
  </div>
</div>

<div class="list" id="list">
  <div class="empty">
    <div class="empty-icon">📡</div>
    <div>Browse a page to capture requests.</div>
    <div style="margin-top:6px;font-size:11px;color:#374151">XHR and Fetch calls will appear here.</div>
  </div>
</div>

<div class="detail" id="detail"></div>

<script src="popup.js"></script>
</body>
</html>
